<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ten &amp; Pick — Metro Vancouver Courts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --ink:#16241d; --ink-soft:#42524a; --ink-faint:#6d7c73;
    --chalk:#eef1ea; --chalk-2:#e4e9df; --card:#fff; --line:#d7ddd2; --line-strong:#c3cbbd;
    --tennis:#2f9e44; --tennis-deep:#1f7a33; --tennis-wash:#e8f5ec;
    --pickle:#ee7b2e; --pickle-deep:#c75f17; --pickle-wash:#fdefe2;
    --both:#1f8a86; --both-wash:#e3f3f2;
    --alert:#d63b2f; --indoor:#3a6ea5;
    --shadow:0 1px 2px rgba(22,36,29,.06), 0 8px 24px -16px rgba(22,36,29,.28);
    --shadow-lg:0 2px 4px rgba(22,36,29,.06), 0 24px 48px -24px rgba(22,36,29,.32);
    --r:16px; --r-sm:10px; --maxw:1180px;
    --font-display:"Archivo",system-ui,sans-serif; --font-body:"DM Sans",system-ui,sans-serif; --font-mono:"Space Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;font-family:var(--font-body);color:var(--ink);background:var(--chalk);line-height:1.55;-webkit-font-smoothing:antialiased;
    background-image:repeating-linear-gradient(90deg,rgba(22,36,29,.018) 0 1px,transparent 1px 64px);}
  a{color:inherit}
  button{font-family:inherit}

  /* top bar */
  .topbar{position:sticky;top:0;z-index:1100;background:rgba(238,241,234,.9);backdrop-filter:saturate(140%) blur(10px);border-bottom:1px solid var(--line)}
  .topbar__in{max-width:var(--maxw);margin:0 auto;padding:11px 18px;display:flex;align-items:center;gap:12px;justify-content:space-between}
  .brand{display:flex;align-items:center;gap:11px;min-width:0}
  .brand__mark{flex:none;width:38px;height:38px;border-radius:11px;background:var(--ink);display:grid;place-items:center}
  .brand__mark svg{width:24px;height:24px}
  .brand__title{font-family:var(--font-display);font-weight:800;letter-spacing:-.01em;font-size:1rem;line-height:1.1;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .brand__sub{font-size:.7rem;color:var(--ink-faint);letter-spacing:.13em;text-transform:uppercase;font-weight:500}
  .langtoggle{display:inline-flex;border:1.5px solid var(--line-strong);border-radius:99px;overflow:hidden;flex:none;background:var(--card)}
  .langtoggle button{border:0;background:transparent;padding:7px 12px;font-weight:800;font-size:.82rem;color:var(--ink-soft);cursor:pointer}
  .langtoggle button[aria-pressed="true"]{background:var(--ink);color:#fff}

  .wrap{max-width:var(--maxw);margin:0 auto;padding:18px 18px 64px}

  /* weather board */
  .board{position:relative;overflow:hidden;background:var(--ink);color:#eef3ee;border-radius:var(--r);box-shadow:var(--shadow-lg);margin:6px 0 14px}
  .board__court{position:absolute;inset:0;width:100%;height:100%;opacity:.5;pointer-events:none}
  .board__in{position:relative;padding:20px 22px}
  .board__head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:4px;flex-wrap:wrap}
  .board__loc{display:flex;align-items:center;gap:8px;font-weight:600;letter-spacing:.02em}
  .board__loc svg{width:17px;height:17px;color:#9fe3b4}
  .board__updated{font-family:var(--font-mono);font-size:.72rem;color:#8fb39d}
  .board__main{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-top:6px}
  .temp{display:flex;align-items:flex-start;line-height:.92}
  .temp__num{font-family:var(--font-mono);font-weight:700;font-size:4.2rem;letter-spacing:-.04em}
  .temp__unit{font-family:var(--font-mono);font-size:1.3rem;margin-top:.5rem;color:#9fe3b4}
  .cond{display:flex;align-items:center;gap:11px;padding-bottom:7px}
  .cond__emoji{font-size:2.4rem;line-height:1}
  .cond__label{font-family:var(--font-display);font-weight:700;font-size:1.2rem;letter-spacing:-.01em}
  .cond__feels{font-size:.82rem;color:#a9c8b6}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-top:16px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden}
  .stat{background:rgba(13,22,17,.55);padding:10px 12px}
  .stat__k{font-size:.68rem;letter-spacing:.07em;text-transform:uppercase;color:#8fb39d;display:flex;align-items:center;gap:5px}
  .stat__k svg{width:13px;height:13px}
  .stat__v{font-family:var(--font-mono);font-weight:700;font-size:1.1rem;margin-top:2px}
  .stat__v small{font-size:.7rem;color:#a9c8b6;font-family:var(--font-body);font-weight:500}
  .forecast{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}
  .fc{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);border-radius:12px;padding:10px;text-align:center}
  .fc__day{font-weight:700;font-size:.84rem;color:#cfe6d6}
  .fc__emoji{font-size:1.5rem;margin:2px 0;line-height:1}
  .fc__hl{font-family:var(--font-mono);font-size:.9rem;font-weight:700}
  .fc__hl .lo{color:#8fb39d}
  .fc__rain{font-size:.7rem;color:#86b8e8;margin-top:2px;display:flex;align-items:center;gap:4px;justify-content:center}
  .fc__rain svg{width:11px;height:11px}
  .wet{display:none;align-items:flex-start;gap:11px;background:var(--alert);color:#fff;border-radius:12px;padding:12px 14px;margin-top:12px;box-shadow:0 10px 26px -14px rgba(214,59,47,.7)}
  .wet.is-on{display:flex}
  .wet svg{flex:none;width:22px;height:22px;margin-top:1px}
  .wet__t{font-family:var(--font-display);font-weight:800;font-size:.98rem}
  .wet__d{font-size:.84rem;opacity:.96;margin-top:1px}
  .board__msg{position:relative;padding:30px 22px;text-align:center;color:#b9d4c2;font-size:.95rem}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#9fe3b4;border-radius:50%;vertical-align:-3px;margin-right:8px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .retry{margin-top:12px;background:#9fe3b4;color:#0d1611;border:0;font-weight:700;padding:8px 16px;border-radius:99px;cursor:pointer;font-size:.86rem}

  /* controls */
  .controls{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:14px;margin-bottom:14px}
  .controls__lab{font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:800;margin:0 0 7px}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .filter{display:inline-flex;align-items:center;gap:7px;cursor:pointer;border:1.5px solid var(--line-strong);background:var(--card);color:var(--ink-soft);padding:8px 14px;border-radius:99px;font-weight:700;font-size:.88rem;transition:transform .12s ease,border-color .15s,color .15s,background .15s}
  .filter svg{width:16px;height:16px}
  .filter:hover{transform:translateY(-1px)}
  .filter[aria-pressed="true"][data-f="all"]{background:var(--ink);border-color:var(--ink);color:#fff}
  .filter[aria-pressed="true"][data-f="tennis"]{background:var(--tennis);border-color:var(--tennis);color:#fff}
  .filter[aria-pressed="true"][data-f="pickleball"]{background:var(--pickle);border-color:var(--pickle);color:#fff}
  .filter:focus-visible{outline:3px solid #94c2ff;outline-offset:2px}
  .controls__row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .field{flex:1;min-width:170px}
  select,.search{width:100%;border:1.5px solid var(--line-strong);border-radius:10px;padding:9px 11px;font-size:.9rem;font-family:inherit;background:var(--card);color:var(--ink)}
  select:focus,.search:focus{outline:3px solid #94c2ff;outline-offset:1px;border-color:var(--ink)}
  .chk{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:.88rem;color:var(--ink-soft);cursor:pointer;border:1.5px solid var(--line-strong);border-radius:10px;padding:9px 12px;white-space:nowrap;user-select:none}
  .chk input{accent-color:var(--indoor);width:16px;height:16px}
  .chk.is-on{background:#eef4fb;border-color:#a9c8e8;color:var(--indoor)}

  /* map */
  #map{height:380px;width:100%;border-radius:var(--r);border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:6px;z-index:1}
  .leaflet-container{font-family:var(--font-body);background:#dfe6da}
  .pin{width:24px;height:24px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35);display:grid;place-items:center}
  .pin i{transform:rotate(45deg);font-style:normal;font-size:11px;line-height:1;color:#fff;font-weight:800}
  .pin--t{background:var(--tennis)} .pin--p{background:var(--pickle)} .pin--b{background:conic-gradient(var(--tennis) 0 50%,var(--pickle) 0 100%)}
  .pin--in{box-shadow:0 0 0 2px #fff,0 0 0 4px var(--indoor),0 2px 5px rgba(0,0,0,.35)}
  .pop{font-family:var(--font-body);min-width:180px}
  .pop__n{font-family:var(--font-display);font-weight:800;font-size:.98rem;line-height:1.2;margin-bottom:3px}
  .pop__m{font-size:.78rem;color:var(--ink-faint);margin-bottom:7px}
  .pop__tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
  .ptag{font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:99px}
  .ptag--t{background:var(--tennis-wash);color:var(--tennis-deep)} .ptag--p{background:var(--pickle-wash);color:var(--pickle-deep)} .ptag--in{background:#eef4fb;color:var(--indoor)}
  .pop__btns{display:flex;gap:6px}
  .pop__btns a,.pop__btns button{flex:1;text-align:center;font-size:.78rem;font-weight:700;padding:6px 8px;border-radius:8px;text-decoration:none;cursor:pointer;border:1.5px solid var(--line-strong);background:var(--card);color:var(--ink)}
  .pop__btns a.prim{background:var(--ink);color:#fff;border-color:var(--ink)}
  .map-leg{display:flex;gap:14px;flex-wrap:wrap;font-size:.76rem;color:var(--ink-soft);margin:0 2px 16px;padding-top:2px}
  .map-leg span{display:inline-flex;align-items:center;gap:6px}
  .map-leg .d{width:11px;height:11px;border-radius:3px}
  .map-leg .d.t{background:var(--tennis)} .map-leg .d.p{background:var(--pickle)} .map-leg .d.b{background:conic-gradient(var(--tennis) 0 50%,var(--pickle) 0 100%)} .map-leg .d.in{background:#fff;box-shadow:0 0 0 2px var(--indoor)}

  .count{font-size:.85rem;color:var(--ink-faint);font-family:var(--font-mono);margin:2px 2px 12px}

  /* group heading per city */
  .city-h{display:flex;align-items:baseline;gap:10px;margin:22px 2px 12px;padding-bottom:8px;border-bottom:2px solid var(--line)}
  .city-h h2{font-family:var(--font-display);font-weight:900;letter-spacing:-.01em;font-size:1.4rem;margin:0}
  .city-h .en{font-size:.85rem;color:var(--ink-faint);font-weight:600}
  .city-h .n{margin-left:auto;font-family:var(--font-mono);font-size:.8rem;color:var(--ink-faint)}

  /* grid + cards */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:15px}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:transform .14s ease,box-shadow .14s ease,outline-color .2s}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
  .card.is-hidden{display:none}
  .card.flash{outline:3px solid var(--both);outline-offset:2px}
  .card__stripe{height:6px;width:100%}
  .stripe--t{background:var(--tennis)} .stripe--p{background:var(--pickle)} .stripe--b{background:linear-gradient(90deg,var(--tennis),var(--pickle))}
  .card__body{padding:15px 16px;flex:1;display:flex;flex-direction:column}
  .card__head{display:flex;gap:10px;align-items:flex-start;justify-content:space-between}
  .card__name{font-family:var(--font-display);font-weight:800;font-size:1.12rem;letter-spacing:-.01em;line-height:1.16}
  .card__meta{font-size:.76rem;color:var(--ink-faint);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .card__meta svg{width:12px;height:12px;flex:none}
  .star{color:#d68a00;font-weight:700;font-family:var(--font-mono)}
  .card__diagram{flex:none;width:50px;height:38px;opacity:.92}
  .tag-in{font-size:.66rem;font-weight:800;padding:2px 7px;border-radius:99px;background:#eef4fb;color:var(--indoor)}
  .card__intro{font-size:.88rem;color:var(--ink-soft);margin:10px 0 12px}
  .badges{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .badge{display:inline-flex;align-items:center;gap:6px;font-size:.78rem;font-weight:700;padding:5px 9px;border-radius:9px;border:1px solid}
  .badge svg{width:15px;height:15px}
  .badge--t{background:var(--tennis-wash);border-color:#bfe4c9;color:var(--tennis-deep)}
  .badge--p{background:var(--pickle-wash);border-color:#f6cda6;color:var(--pickle-deep)}
  .badge--none{background:var(--chalk-2);border-color:var(--line);color:var(--ink-faint)}
  .badge .qty{font-family:var(--font-mono)}
  .badge .tg{font-weight:600;opacity:.85;font-size:.72rem}
  .rule{background:#fff8ef;border:1px solid #f6dcbf;border-radius:10px;padding:9px 11px;margin-bottom:12px;font-size:.82rem;color:var(--ink-soft)}
  .rule__k{display:flex;align-items:center;gap:6px;font-weight:800;color:var(--ink);font-size:.74rem;letter-spacing:.03em;text-transform:uppercase;margin-bottom:3px}
  .rule__k svg{width:14px;height:14px}
  .info{display:flex;flex-direction:column;margin-top:auto}
  .info__row{display:flex;gap:9px;padding:9px 0;border-top:1px solid var(--line);font-size:.85rem}
  .info__ic{flex:none;width:28px;height:28px;border-radius:8px;background:var(--chalk);display:grid;place-items:center}
  .info__ic svg{width:15px;height:15px;color:var(--ink-soft)}
  .info__k{font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-faint);font-weight:700}
  .info__v{color:var(--ink);margin-top:1px}
  .pill{display:inline-block;font-size:.68rem;font-weight:700;padding:1px 7px;border-radius:99px;margin-left:6px;vertical-align:1px}
  .pill--free{background:var(--tennis-wash);color:var(--tennis-deep)}
  .pill--paid{background:var(--pickle-wash);color:var(--pickle-deep)}
  .pill--street{background:#eaf0f7;color:#2b5a8c}
  .card__note{font-size:.86rem;color:var(--ink-soft);margin:2px 0 0}
  .card__foot{padding:12px 16px 16px;display:flex;flex-direction:column;gap:8px}
  .cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border-radius:11px;font-weight:800;font-size:.88rem;cursor:pointer;text-decoration:none;border:1.5px solid transparent;transition:transform .12s ease,filter .15s}
  .cta svg{width:16px;height:16px}
  .cta:hover{transform:translateY(-1px)}
  .cta:focus-visible{outline:3px solid #94c2ff;outline-offset:2px}
  .cta--t{background:var(--tennis);color:#fff} .cta--p{background:var(--pickle);color:#fff} .cta--ink{background:var(--ink);color:#fff}
  .cta--t:hover,.cta--p:hover,.cta--ink:hover{filter:brightness(1.06)}
  .cta--ghost{background:var(--card);color:var(--ink);border-color:var(--line-strong)}
  .cta--ghost:hover{background:var(--chalk)}
  .foot-2{display:flex;gap:8px}.foot-2 .cta{flex:1}
  .empty{text-align:center;color:var(--ink-faint);padding:40px 10px;font-size:.95rem}

  .pagefoot{max-width:var(--maxw);margin:24px auto 0;padding:0 18px;color:var(--ink-faint);font-size:.8rem}
  .pagefoot h4{font-family:var(--font-display);color:var(--ink-soft);font-size:.82rem;letter-spacing:.05em;text-transform:uppercase;margin:0 0 6px}
  .pagefoot p{margin:0 0 6px}
  .pagefoot a{color:var(--tennis-deep);text-decoration:underline;text-underline-offset:2px}
  .note-box{background:var(--chalk-2);border-radius:12px;padding:14px 16px}

  .dist{display:inline-flex;align-items:center;gap:3px;font-family:var(--font-mono);font-size:.72rem;font-weight:700;color:#fff;background:var(--ink);padding:1px 7px;border-radius:99px}
  #nearBtn{cursor:pointer}
  .chk#nearBtn.is-on{background:#eaf6ee;border-color:#a9d8ba;color:var(--tennis-deep)}
  .chk#nearBtn.busy{opacity:.7;pointer-events:none}
  .nearmsg{display:none;margin:12px 2px 0;font-size:.82rem;color:var(--alert);background:#fdecea;border:1px solid #f6c9c4;border-radius:10px;padding:9px 12px}
  .nearmsg.is-on{display:block}
  .me{width:16px;height:16px;border-radius:50%;background:#2b7fff;border:3px solid #fff;box-shadow:0 0 0 2px #2b7fff,0 0 0 7px rgba(43,127,255,.25)}

  @media (max-width:720px){
    .wrap{padding:14px 14px 56px}
    .temp__num{font-size:3.4rem}
    .stats{grid-template-columns:repeat(2,1fr)}
    .grid{grid-template-columns:1fr;gap:13px}
    #map{height:320px}
    .field{min-width:140px}
    .brand__sub{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

/* ---- render a card ---- */
function cardHTML(v){
  const inTag = v.indoor?`<span class="tag-in">${t("indoor")}</span>`:"";
  if(v.tier==="full"){
    let badges="";
    if(v.tennis) badges+=`<span class="badge badge--t"><svg aria-hidden="true"><use href="#i-racquet"/></svg>${t("tTennis")} <span class="qty">${t("courts")(v.tennis.n)}</span><span class="tg">${tx(v.tennis.tag)}</span></span>`;
    if(v.pickle) badges+=`<span class="badge badge--p"><svg aria-hidden="true"><use href="#i-paddle"/></svg>${t("pPickle")} <span class="qty">${t("courts")(v.pickle.n)}</span><span class="tg">${tx(v.pickle.tag)}</span></span>`;
    else badges+=`<span class="badge badge--none"><svg aria-hidden="true"><use href="#i-paddle"/></svg>${t("noPickle")}</span>`;
    const pk=v.parking, pkPill=pk==="free"?`<span class="pill pill--free">${t("free")}</span>`:pk==="paid"?`<span class="pill pill--paid">${t("paid")}</span>`:`<span class="pill pill--street">${t("street")}</span>`;
    const btns=v.links.map(l=>`<a class="cta cta--${l.style}" href="${l.url}" target="_blank" rel="noopener"><svg aria-hidden="true"><use href="#i-${l.style==='ghost'?'ext':'ticket'}"/></svg>${tx(l.label)}</a>`).join("");
    return `<article class="card" id="card-${v._id}" data-t="${hasT(v)?1:0}" data-p="${hasP(v)?1:0}" data-in="${v.indoor?1:0}" data-city="${v.c}" data-name="${v.n.toLowerCase()}">
      <div class="card__stripe ${stripeClass(v.s)}"></div>
      <div class="card__body">
        <div class="card__head"><div>
          <h3 class="card__name">${v.n}</h3>
          <div class="card__meta"><svg aria-hidden="true"><use href="#i-pin"/></svg>${cityName(v.c)} ${starHtml(v)} ${inTag} ${distHtml(v)}</div>
        </div>${diagram(v.s)}</div>
        <p class="card__intro">${tx(v.intro)}</p>
        <div class="badges">${badges}</div>
        <div class="rule"><div class="rule__k"><svg aria-hidden="true"><use href="#i-rules"/></svg>${v.share.star?t("rShareStar"):t("rShare")}</div>${tx(v.share.txt)}</div>
        <div class="info">
          ${v.price?`<div class="info__row"><div class="info__ic"><svg aria-hidden="true"><use href="#i-ticket"/></svg></div><div><div class="info__k">${t("rPrice")}</div><div class="info__v">${tx(v.price)}</div></div></div>`:""}
          <div class="info__row"><div class="info__ic"><svg aria-hidden="true"><use href="#i-parking"/></svg></div><div><div class="info__k">${t("rPark")}${pkPill}</div><div class="info__v">${tx(v.parkingTxt)}</div></div></div>
          <div class="info__row"><div class="info__ic"><svg aria-hidden="true"><use href="#i-wc"/></svg></div><div><div class="info__k">${t("rWC")}</div><div class="info__v">${tx(v.wc)}</div></div></div>
          <div class="info__row"><div class="info__ic"><svg aria-hidden="true"><use href="#i-clock"/></svg></div><div><div class="info__k">${t("rHours")}</div><div class="info__v">${tx(v.hours)}</div></div></div>
        </div>
      </div>
      <div class="card__foot">${btns}<a class="cta cta--ghost" href="${mapsUrl(v)}" target="_blank" rel="noopener"><svg aria-hidden="true"><use href="#i-map"/></svg>${t("gmap")}</a></div>
    </article>`;
  }
  // basic
  let badges="";
  if(hasT(v)) badges+=`<span class="badge badge--t"><svg aria-hidden="true"><use href="#i-racquet"/></svg>${t("tTennis")}</span>`;
  if(hasP(v)) badges+=`<span class="badge badge--p"><svg aria-hidden="true"><use href="#i-paddle"/></svg>${t("pPickle")}</span>`;

    <div class="card__stripe ${stripeClass(v.s)}"></div>
    <div class="card__body">
      <div class="card__head"><div>
        <h3 class="card__name">${v.n}</h3>
        <div class="card__meta"><svg aria-hidden="true"><use href="#i-pin"/></svg>${cityName(v.c)} ${starHtml(v)} ${inTag} ${distHtml(v)}</div>
      </div>${diagram(v.s)}</div>
      <div class="badges" style="margin:10px 0 8px">${badges}</div>
      <p class="card__note">${tx(v.note)}</p>
      ${v.indoor?infoIndoor(v):""}
    </div>
    <div class="card__foot"><div class="foot-2">
      <a class="cta cta--ghost" href="${mapsUrl(v)}" target="_blank" rel="noopener"><svg aria-hidden="true"><use href="#i-map"/></svg>${t("gmap")}</a>
      <a class="cta cta--ink" href="${dirUrl(v)}" target="_blank" rel="noopener"><svg aria-hidden="true"><use href="#i-pin"/></svg>${t("dir")}</a>
    </div></div>
  </article>`;
}

/* ---- state ---- */
let sport="all", city="all", indoorOnly=false, query="";
let userLoc=null, sortMode="city", locating=false;
function haversine(la1,lo1,la2,lo2){const R=6371,toR=Math.PI/180;const dLa=(la2-la1)*toR,dLo=(lo2-lo1)*toR;const a=Math.sin(dLa/2)**2+Math.cos(la1*toR)*Math.cos(la2*toR)*Math.sin(dLo/2)**2;return 2*R*Math.asin(Math.sqrt(a));}
function fmtDist(km){return km<1?t("distM")(Math.round(km*1000)):t("distKm")(km.toFixed(1));}
function distHtml(v){return v._dist!=null?`<span class="dist"><svg aria-hidden="true" style="width:11px;height:11px"><use href="#i-pin"/></svg>${fmtDist(v._dist)}</span>`:"";}
function matches(v){
  if(sport==="tennis" && !hasT(v)) return false;
  if(sport==="pickleball" && !hasP(v)) return false;
  if(city!=="all" && v.c!==city) return false;
  if(indoorOnly && !v.indoor) return false;
  if(query && !v.n.toLowerCase().includes(query)) return false;
  return true;
}

/* ---- render list grouped by city ---- */
const listEl=document.getElementById("list");
function renderList(){
  const shown=VENUES.filter(matches);
  document.getElementById("resultCount").textContent=t("result")(shown.length);
  VENUES.forEach(v=>v._dist=null);
  if(!shown.length){ listEl.innerHTML=`<p class="empty">${t("empty")}</p>`; return; }
  if(sortMode==="distance" && userLoc){
    shown.forEach(v=>v._dist=haversine(userLoc.lat,userLoc.lng,v.lat,v.lng));
    const sorted=shown.slice().sort((a,b)=>a._dist-b._dist);
    listEl.innerHTML=`<div class="city-h"><h2>${t("nearHeading")}</h2><span class="n">${sorted.length}</span></div><div class="grid">${sorted.map(cardHTML).join("")}</div>`;
    return;
  }
  let html="";
  CITY_ORDER.forEach(c=>{
    const inCity=shown.filter(v=>v.c===c);
    if(!inCity.length) return;
    html+=`<div class="city-h"><h2>${cityName(c)}</h2>${lang==="zh"?`<span class="en">${c}</span>`:""}<span class="n">${inCity.length}</span></div><div class="grid">${inCity.map(cardHTML).join("")}</div>`;
  });
  listEl.innerHTML=html;
}

let map, markerLayer;
function pinIcon(v){
  const cls=v.s==="t"?"pin--t":v.s==="p"?"pin--p":"pin--b";
  const inn=v.indoor?" pin--in":"";
  const glyph=v.s==="p"?"P":v.s==="b"?"+":"T";
  return L.divIcon({className:"",html:`<div class="pin ${cls}${inn}"><i>${glyph}</i></div>`,iconSize:[24,24],iconAnchor:[12,24],popupAnchor:[0,-22]});
}
function popHTML(v){
  let tags="";
  if(hasT(v)) tags+=`<span class="ptag ptag--t">${t("tTennis")}</span>`;
  if(hasP(v)) tags+=`<span class="ptag ptag--p">Pickleball</span>`;
  if(v.indoor) tags+=`<span class="ptag ptag--in">${t("indoor")}</span>`;
  return `<div class="pop"><div class="pop__n">${v.n}</div><div class="pop__m">${cityName(v.c)} ${v.r?"· ★ "+v.r.toFixed(1):""}</div>
    <div class="pop__tags">${tags}</div>
    <div class="pop__btns"><a class="prim" href="${dirUrl(v)}" target="_blank" rel="noopener">${t("dir")}</a>
    <button onclick="goCard('${v._id}')">${t("details")}</button></div></div>`;
}
let userMarker=null;
function setUserOnMap(){
  if(!map||!userLoc) return;
  if(userMarker){ userMarker.remove(); userMarker=null; }
  userMarker=L.marker([userLoc.lat,userLoc.lng],{icon:L.divIcon({className:"",html:'<div class="me"></div>',iconSize:[16,16],iconAnchor:[8,8]}),title:t("youHere"),zIndexOffset:1000}).addTo(map);
}
function renderMap(){
  if(!map) return;
  markerLayer.clearLayers();
  const shown=VENUES.filter(matches);
  const pts=[];
  shown.forEach(v=>{ const m=L.marker([v.lat,v.lng],{icon:pinIcon(v),title:v.n}); m.bindPopup(popHTML(v)); m.addTo(markerLayer); pts.push([v.lat,v.lng]); });
  setUserOnMap();
  if(userLoc && sortMode==="distance"){
    const near=shown.map(v=>[haversine(userLoc.lat,userLoc.lng,v.lat,v.lng),[v.lat,v.lng]]).sort((a,b)=>a[0]-b[0]).slice(0,8).map(x=>x[1]);
    const b=[[userLoc.lat,userLoc.lng]].concat(near);
    if(b.length>1) map.fitBounds(b,{padding:[50,50],maxZoom:15}); else map.setView([userLoc.lat,userLoc.lng],13);
  } else if(pts.length){ map.fitBounds(pts,{padding:[40,40],maxZoom:14}); }
}
window.goCard=function(id){
  const el=document.getElementById("card-"+id);
  if(!el) return;
  el.scrollIntoView({behavior:"smooth",block:"center"});
  el.classList.add("flash"); setTimeout(()=>el.classList.remove("flash"),1600);
};

function refresh(){ renderList(); renderMap(); }

/* ---- controls wiring ---- */
function buildCityFilter(){
  const sel=document.getElementById("cityFilter");
  const cur=sel.value||"all";
  let opts=`<option value="all">${t("cityAll")}</option>`;
  CITY_ORDER.forEach(c=>{ const n=VENUES.filter(v=>v.c===c).length; if(n) opts+=`<option value="${c}">${cityName(c)} (${n})</option>`; });
  sel.innerHTML=opts; sel.value=cur;
}
document.querySelectorAll("#sportFilters .filter").forEach(b=>{
  b.addEventListener("click",()=>{ document.querySelectorAll("#sportFilters .filter").forEach(x=>x.setAttribute("aria-pressed",x===b?"true":"false")); sport=b.dataset.f; refresh(); });
});
document.getElementById("cityFilter").addEventListener("change",e=>{ city=e.target.value; refresh(); });
document.getElementById("search").addEventListener("input",e=>{ query=e.target.value.trim().toLowerCase(); refresh(); });
const indoorChk=document.getElementById("indoorChk");
document.getElementById("indoorOnly").addEventListener("change",e=>{ indoorOnly=e.target.checked; indoorChk.classList.toggle("is-on",indoorOnly); refresh(); });

/* ---- nearest-first: GPS + manual fallbacks (area menu / tap map) ---- */
const AREAS=[
  {zh:"溫哥華市中心",en:"Downtown Vancouver",lat:49.2820,lng:-123.1190},
  {zh:"Kitsilano／西區",en:"Kitsilano / West Side",lat:49.2660,lng:-123.1660},
  {zh:"東溫哥華",en:"East Vancouver",lat:49.2510,lng:-123.0700},
  {zh:"UBC",en:"UBC",lat:49.2606,lng:-123.2460},
  {zh:"本拿比 Metrotown",en:"Burnaby — Metrotown",lat:49.2270,lng:-122.9990},
  {zh:"本拿比 Lougheed",en:"Burnaby — Lougheed",lat:49.2490,lng:-122.8960},
  {zh:"列治文市中心",en:"Richmond Centre",lat:49.1670,lng:-123.1360},
  {zh:"北溫",en:"North Vancouver",lat:49.3200,lng:-123.0700},
  {zh:"西溫",en:"West Vancouver",lat:49.3290,lng:-123.1600},
  {zh:"新西敏",en:"New Westminster",lat:49.2060,lng:-122.9110},
  {zh:"高貴林市中心",en:"Coquitlam Centre",lat:49.2780,lng:-122.7960},
  {zh:"高貴林港 PoCo",en:"Port Coquitlam",lat:49.2620,lng:-122.7810},
  {zh:"滿地寶",en:"Port Moody",lat:49.2830,lng:-122.8310},
  {zh:"素里中心",en:"Surrey — Central",lat:49.1890,lng:-122.8460},
  {zh:"三角洲 Ladner",en:"Delta — Ladner",lat:49.0900,lng:-123.0820},
  {zh:"楚瓦森",en:"Tsawwassen",lat:49.0110,lng:-123.0840},
  {zh:"蘭里",en:"Langley",lat:49.1040,lng:-122.6600}
];
const nearBtn=document.getElementById("nearBtn"), nearMsg=document.getElementById("nearMsg");
let pickMode=false;
function setPickMode(on){ pickMode=on; if(map) map.getContainer().style.cursor = on?"crosshair":""; }
function buildAreaPicker(){
  const sel=document.getElementById("areaPick"); if(!sel) return;
  const cur=sel.value;
  let o=`<option value="">${t("areaPlaceholder")}</option>`;
  AREAS.forEach(a=>{ o+=`<option value="${a.lat},${a.lng}">${tx(a)}</option>`; });
  sel.innerHTML=o; sel.value=cur;
}
function updateNearBtn(){
  const lbl=document.getElementById("nearLbl"); if(lbl) lbl.textContent = locating ? t("nearLocating") : t("nearBtn");
  nearBtn.classList.toggle("is-on", sortMode==="distance");
  nearBtn.classList.toggle("busy", locating);
}
function showNearMsg(on){ nearMsg.textContent = on ? t("nearErr") : ""; nearMsg.classList.toggle("is-on", !!on); }
function setUserLoc(la,lo,label){ userLoc={lat:la,lng:lo}; locating=false; sortMode="distance"; setPickMode(false); showNearMsg(false); updateNearBtn(); refresh(); loadWeather(la,lo,label==null?"mine":label); }
function requestLocation(){
  showNearMsg(false);
  if(!navigator.geolocation){ showNearMsg(true); setPickMode(true); return; }
  locating=true; updateNearBtn();
  navigator.geolocation.getCurrentPosition(
    (pos)=>{ setUserLoc(pos.coords.latitude,pos.coords.longitude); },
    ()=>{ locating=false; sortMode="city"; updateNearBtn(); showNearMsg(true); setPickMode(true); refresh(); },
    {enableHighAccuracy:true, timeout:10000, maximumAge:60000}
  );
}
nearBtn.addEventListener("click",()=>{
  if(sortMode==="distance"){ sortMode="city"; setPickMode(false); updateNearBtn(); refresh(); return; }
  showNearMsg(false);
  if(userLoc){ sortMode="distance"; updateNearBtn(); refresh(); }
  else requestLocation();
});
document.getElementById("areaPick").addEventListener("change",(e)=>{
  const v=e.target.value; if(!v) return;
  const p=v.split(",").map(Number);
  const a=AREAS.find(x=>x.lat===p[0]&&x.lng===p[1]);
  setUserLoc(p[0],p[1], a||e.target.selectedOptions[0].textContent);
});

/* ---- language ---- */
function applyLang(){
  document.documentElement.lang = lang==="zh"?"zh-Hant":"en";
  document.querySelectorAll("[data-i]").forEach(el=>{ const k=el.getAttribute("data-i"); if(UI[lang][k]!=null) el.textContent=UI[lang][k]; });
  document.getElementById("search").placeholder=t("searchPh");
  buildCityFilter();
  buildAreaPicker();
  updateNearBtn();
  if(nearMsg.classList.contains("is-on")) nearMsg.textContent=t("nearErr");
  refresh();
  if(window._wx) document.getElementById("board-content").innerHTML=weatherHTML(window._wx);
}
document.querySelectorAll(".langtoggle button").forEach(b=>{
  b.addEventListener("click",()=>{ lang=b.dataset.lang; document.querySelectorAll(".langtoggle button").forEach(x=>x.setAttribute("aria-pressed",x===b?"true":"false")); applyLang(); });
});

/* ===================== WEATHER (Open-Meteo) ===================== */
const VAN={lat:49.2827,lng:-123.1207};
const WMO={0:{t:{zh:"天晴",en:"Clear"},e:"☀️"},1:{t:{zh:"大致天晴",en:"Mainly clear"},e:"🌤️"},2:{t:{zh:"部分多雲",en:"Partly cloudy"},e:"⛅"},3:{t:{zh:"多雲/陰天",en:"Overcast"},e:"☁️"},45:{t:{zh:"有霧",en:"Fog"},e:"🌫️"},48:{t:{zh:"凍霧",en:"Rime fog"},e:"🌫️"},51:{t:{zh:"毛毛雨",en:"Light drizzle"},e:"🌦️",rain:1},53:{t:{zh:"毛毛雨",en:"Drizzle"},e:"🌦️",rain:1},55:{t:{zh:"密毛雨",en:"Dense drizzle"},e:"🌧️",rain:1},56:{t:{zh:"凍毛雨",en:"Freezing drizzle"},e:"🌧️",rain:1},57:{t:{zh:"凍毛雨",en:"Freezing drizzle"},e:"🌧️",rain:1},61:{t:{zh:"小雨",en:"Light rain"},e:"🌦️",rain:1},63:{t:{zh:"中雨",en:"Rain"},e:"🌧️",rain:1},65:{t:{zh:"大雨",en:"Heavy rain"},e:"🌧️",rain:1},66:{t:{zh:"凍雨",en:"Freezing rain"},e:"🌧️",rain:1},67:{t:{zh:"凍雨",en:"Freezing rain"},e:"🌧️",rain:1},71:{t:{zh:"小雪",en:"Light snow"},e:"🌨️"},73:{t:{zh:"中雪",en:"Snow"},e:"🌨️"},75:{t:{zh:"大雪",en:"Heavy snow"},e:"❄️"},77:{t:{zh:"雪粒",en:"Snow grains"},e:"🌨️"},80:{t:{zh:"陣雨",en:"Showers"},e:"🌦️",rain:1},81:{t:{zh:"陣雨",en:"Showers"},e:"🌧️",rain:1},82:{t:{zh:"狂風大陣雨",en:"Violent showers"},e:"⛈️",rain:1},85:{t:{zh:"陣雪",en:"Snow showers"},e:"🌨️"},86:{t:{zh:"大陣雪",en:"Snow showers"},e:"❄️"},95:{t:{zh:"雷暴",en:"Thunderstorm"},e:"⛈️",rain:1},96:{t:{zh:"雷暴夾冰雹",en:"Thunderstorm, hail"},e:"⛈️",rain:1},99:{t:{zh:"雷暴夾冰雹",en:"Thunderstorm, hail"},e:"⛈️",rain:1}};
const wmo=(c)=>WMO[c]||{t:{zh:"—",en:"—"},e:"🌡️"};

function wxLabelText(){
  const L=window._wxLabel;
  if(L==null) return t("wLoc");
  if(typeof L==="object") return tx(L);
  if(L==="mine") return t("myLocation");
  return String(L);
}
function weatherHTML(d){
  const cur=d.current, day=d.daily, w=wmo(cur.weather_code);
  const temp=Math.round(cur.temperature_2m), feels=Math.round(cur.apparent_temperature);
  const hum=Math.round(cur.relative_humidity_2m), wind=Math.round(cur.wind_speed_10m);
  const todayRain=day.precipitation_probability_max?.[0]??"—", hi=Math.round(day.temperature_2m_max[0]), lo=Math.round(day.temperature_2m_min[0]);
  const isWet=!!w.rain||(cur.rain??0)>0||(cur.precipitation??0)>0||(cur.showers??0)>0;
  const updated=new Date().toLocaleTimeString(lang==="zh"?"zh-HK":"en-CA",{hour:"2-digit",minute:"2-digit"});
  const fc=day.time.slice(0,3).map((iso,i)=>{const ww=wmo(day.weather_code[i]);const dh=Math.round(day.temperature_2m_max[i]),dl=Math.round(day.temperature_2m_min[i]),rp=day.precipitation_probability_max?.[i]??"—";
    return `<div class="fc"><div class="fc__day">${t("days")[i]}</div><div class="fc__emoji">${ww.e}</div><div class="fc__hl">${dh}°<span class="lo"> / ${dl}°</span></div><div class="fc__rain"><svg aria-hidden="true"><use href="#i-rainprob"/></svg>${rp}%</div></div>`;}).join("");
  return `<div class="board__in">
    <div class="board__head"><div class="board__loc"><svg aria-hidden="true"><use href="#i-pin"/></svg>${wxLabelText()}</div><div class="board__updated">${t("wUpd")} ${updated}</div></div>
    <div class="board__main"><div class="temp"><span class="temp__num">${temp}</span><span class="temp__unit">°C</span></div>
      <div class="cond"><span class="cond__emoji">${w.e}</span><span><span class="cond__label">${tx(w.t)}</span><br><span class="cond__feels">${t("wFeels")} ${feels}°C</span></span></div></div>
    <div class="stats">
      <div class="stat"><div class="stat__k"><svg aria-hidden="true"><use href="#i-rainprob"/></svg>${t("wRainToday")}</div><div class="stat__v">${todayRain}<small>%</small></div></div>
      <div class="stat"><div class="stat__k"><svg aria-hidden="true"><use href="#i-hum"/></svg>${t("wHum")}</div><div class="stat__v">${hum}<small>%</small></div></div>
      <div class="stat"><div class="stat__k"><svg aria-hidden="true"><use href="#i-wind"/></svg>${t("wWind")}</div><div class="stat__v">${wind}<small> km/h</small></div></div>
      <div class="stat"><div class="stat__k"><svg aria-hidden="true"><use href="#i-clock"/></svg>${t("wHiLo")}</div><div class="stat__v">${hi}°<small> / ${lo}°</small></div></div>
    </div>
    <div class="wet ${isWet?'is-on':''}" role="alert"><svg aria-hidden="true"><use href="#i-warn"/></svg><div><div class="wet__t">${t("wetT")}</div><div class="wet__d">${t("wetD")}</div></div></div>
    <div class="forecast">${fc}</div></div>`;
}
async function loadWeather(lat, lng, label){
  if(lat==null){ lat=VAN.lat; lng=VAN.lng; label=null; }
  window._wxReq={lat,lng,label}; window._wxLabel=label;
  document.getElementById("board-content").innerHTML=`<div class="board__msg"><span class="spin"></span>${t("wLoading")}</div>`;
  const url="https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lng+"&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,rain,showers,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=3";
  try{
    const res=await fetch(url); if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json(); if(!data.current||!data.daily) throw new Error("bad payload");
    window._wx=data; document.getElementById("board-content").innerHTML=weatherHTML(data);
  }catch(err){
    console.error("weather failed:",err);
    document.getElementById("board-content").innerHTML=`<div class="board__msg">${t("wErr")}<br><button class="retry" id="retryW">${t("wRetry")}</button></div>`;
    document.getElementById("retryW").addEventListener("click",()=>{ const r=window._wxReq||{}; loadWeather(r.lat,r.lng,r.label); });
  }
}

/* ===================== init ===================== */
applyLang();          // builds list + city filter + chrome
loadWeather();
window.addEventListener("load",()=>{
  map=L.map("map",{scrollWheelZoom:false}).setView([49.22,-122.98],10);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
  markerLayer=L.layerGroup().addTo(map);
  renderMap();
  map.on("click",(e)=>{ if(!pickMode) return; setUserLoc(e.latlng.lat,e.latlng.lng); });
});
</script>
